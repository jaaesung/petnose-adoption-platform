server {
    listen 80;
    server_name _;

    # 이미지 업로드를 위한 본문 크기 제한 (.env의 MAX_UPLOAD_SIZE_MB와 맞춤)
    # MAX_UPLOAD_SIZE_MB 변경 시 이 값도 수동으로 맞춰야 합니다.
    client_max_body_size 20m;

    # ---------------------------------------------------------------
    # 정적 파일 서빙: 업로드된 이미지를 Nginx가 직접 서빙합니다.
    # uploads_data 볼륨이 /var/uploads 에 읽기 전용으로 마운트됩니다.
    # URL 형식: GET /files/{relative_path}
    # 예: GET /files/dogs/{uuid}/nose/20260412_143022_front.jpg
    # 정책 상세: docs/FILE_STORAGE_AND_URL_POLICY.md
    # ---------------------------------------------------------------
    location /files/ {
        alias /var/uploads/;

        # 허용 이미지 확장자만 서빙 (HTML/JS 실행 차단)
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 그 외 확장자는 접근 차단
        return 404;
    }

    # ---------------------------------------------------------------
    # API 및 그 외 모든 요청 → Spring Boot 프록시
    # ---------------------------------------------------------------
    location / {
        proxy_pass         http://spring-api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
