name: petnose

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # CMD-SHELL: $$VAR лҠ” м»Ён…Ңмқҙл„Ҳ нҷҳкІҪліҖмҲҳлҘј м°ёмЎ° (Compose ліҖмҲҳ м№ҳнҷҳ м•„лӢҳ)
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:v1.9.2
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # bash /dev/tcp мӮ¬мҡ© вҖ” curl/wget м—ҶлҠ” minimal мқҙлҜём§Җ лҢҖмқ‘
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

  python-embed:
    build:
      context: ../../python-embed
      dockerfile: Dockerfile
    environment:
      EMBED_VECTOR_DIM: ${QDRANT_VECTOR_DIM:-128}
      EMBED_MODEL: ${EMBED_MODEL:-mock-v1}
      MAX_IMAGE_BYTES: ${MAX_UPLOAD_SIZE_MB:-20}000000
    volumes:
      - uploads_data:${UPLOAD_BASE_PATH:-/var/uploads}
    # healthcheckлҠ” Dockerfileм—җ м •мқҳлҗЁ (python urllib мӮ¬мҡ©, curl л¶Ҳн•„мҡ”)
    networks:
      - internal

  spring-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      PYTHON_EMBED_URL: ${PYTHON_EMBED_URL:-http://python-embed:8000}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-dog_nose_embeddings}
      QDRANT_VECTOR_DIM: ${QDRANT_VECTOR_DIM:-128}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-Cosine}
      UPLOAD_BASE_PATH: ${UPLOAD_BASE_PATH:-/var/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
    volumes:
      - uploads_data:${UPLOAD_BASE_PATH:-/var/uploads}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      python-embed:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      # м—…лЎңл“ң мқҙлҜём§Җ м •м Ғ м„ңл№ҷ: /files/{relative_path} вҶ’ /var/uploads/{relative_path}
      # мқҪкё° м „мҡ©мңјлЎң л§ҲмҡҙнҠё (nginxлҠ” нҢҢмқјмқ„ м“°м§Җ м•ҠмқҢ)
      # м •мұ… мғҒм„ё: docs/FILE_STORAGE_AND_URL_POLICY.md
      - uploads_data:${UPLOAD_BASE_PATH:-/var/uploads}:ro
    depends_on:
      spring-api:
        condition: service_healthy
    networks:
      - internal

volumes:
  mysql_data:
  qdrant_storage:
  uploads_data:

networks:
  internal:
    driver: bridge
