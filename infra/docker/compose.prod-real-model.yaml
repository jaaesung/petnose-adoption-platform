# Production override for the GHCR real-model Python Embed image.
# Use with:
#   docker compose --env-file infra/docker/.env \
#     -f infra/docker/compose.yaml \
#     -f infra/docker/compose.prod.yaml \
#     -f infra/docker/compose.prod-real-model.yaml \
#     up -d --no-build

services:
  python-embed:
    image: ${PYTHON_EMBED_REAL_IMAGE:?Set PYTHON_EMBED_REAL_IMAGE in infra/docker/.env}
    environment:
      EMBED_MODEL: dog-nose-identification2
      EMBED_VECTOR_DIM: "2048"
      EMBED_DEVICE: ${EMBED_DEVICE:-cpu}
      DOG_NOSE_MODEL_DIR: /models/dog_nose_identification2
      DOG_NOSE_MODEL_PATH: ${DOG_NOSE_MODEL_PATH:-}
      MAX_BATCH_IMAGES: "5"
      MAX_BATCH_TOTAL_BYTES: "83886080"
    volumes:
      - ${DOG_NOSE_MODEL_DIR_HOST:?Set DOG_NOSE_MODEL_DIR_HOST to the EC2 model directory}:/models/dog_nose_identification2:ro

  spring-api:
    environment:
      QDRANT_COLLECTION: dog_nose_embeddings_real_v2
      QDRANT_VECTOR_DIM: "2048"
      QDRANT_SEARCH_SCORE_THRESHOLD: "0.55"
      NOSE_DUPLICATE_THRESHOLD: "0.65"
      NOSE_REVIEW_LOWER_BOUND: "0.65"
      NOSE_REFERENCE_MIN_COUNT: "5"
      NOSE_REFERENCE_MAX_COUNT: "5"
      NOSE_REFERENCE_CONSISTENCY_THRESHOLD: "0.55"
      NOSE_REFERENCE_OUTLIER_IMPROVEMENT_THRESHOLD: "0.04"
      NOSE_REFERENCE_QUALITY_WARNING_ENABLED: "true"
      NOSE_PREPROCESS_VERSION: rgb_resize224_bicubic_imagenet_l2_v1
      PETNOSE_HANDOVER_VERIFICATION_MATCH_THRESHOLD: "0.65"
      PETNOSE_HANDOVER_VERIFICATION_AMBIGUOUS_THRESHOLD: "0.65"
      PETNOSE_HANDOVER_VERIFICATION_TOP_K: ${PETNOSE_HANDOVER_VERIFICATION_TOP_K:-5}
      MAX_UPLOAD_FILE_SIZE_MB: "20"
      MAX_UPLOAD_REQUEST_SIZE_MB: "80"
      PYTHON_EMBED_RESPONSE_TIMEOUT_MS: "30000"
