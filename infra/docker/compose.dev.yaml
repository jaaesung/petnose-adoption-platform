# dev 환경 오버라이드
# 사용: docker compose -f compose.yaml -f compose.dev.yaml up -d
# 또는:  bash infra/scripts/dev-up.sh
# 실제 모델 모드가 필요하면 compose.real-model.yaml을 추가로 병합:
#   docker compose -f compose.yaml -f compose.dev.yaml -f compose.real-model.yaml up -d --build

services:
  mysql:
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped

  qdrant:
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    restart: unless-stopped

  python-embed:
    ports:
      - "${PYTHON_EMBED_PORT:-8000}:8000"
    restart: unless-stopped

  spring-api:
    ports:
      - "${SPRING_APP_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      # dev profile 명시 — DevController(/api/dev/*) 활성화
      SPRING_PROFILES_ACTIVE: dev

  nginx:
    restart: unless-stopped
