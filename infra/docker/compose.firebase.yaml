# Firebase chat/push optional runtime override.
#
# Use this file only when Firebase chat/push should be enabled.
# The Firebase service account JSON must live outside this repository and must
# never be committed. This override can be combined with the existing dev/prod
# compose files without changing non-Firebase deployments.
#
# Dev example:
#   docker compose --env-file .env -f compose.yaml -f compose.dev.yaml -f compose.firebase.yaml up -d --build
#
# Prod example:
#   docker compose --env-file .env -f compose.yaml -f compose.prod.yaml -f compose.firebase.yaml up -d --no-build

services:
  spring-api:
    environment:
      FIREBASE_ENABLED: "true"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?Set FIREBASE_PROJECT_ID}
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-service-account.json
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:?Set FIREBASE_CREDENTIALS_HOST_PATH}:/run/secrets/firebase-service-account.json:ro
