name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  backend-test:
    name: Spring Boot 테스트
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # gradlew 없이 gradle 명령을 직접 사용 (wrapper jar 불필요)
      # TODO: gradle/actions/setup-gradle@v4 로 업그레이드 시 Node 20 deprecation 경고 해소 가능
      #       현재는 CI 안정성 우선으로 @v3 유지
      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Gradle 테스트
        run: gradle test --no-daemon --stacktrace

  python-smoke:
    name: Python smoke 테스트
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-embed

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install --no-cache-dir -r requirements.txt

      - name: smoke 테스트 (app.main import 확인)
        run: python -c "from app.main import app; print('FastAPI app import OK')"

  docker-build:
    name: Docker 이미지 빌드 확인
    runs-on: ubuntu-latest
    needs: [backend-test, python-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: backend 이미지 빌드
        run: docker build -t petnose-spring-api:ci ./backend

      - name: python-embed 이미지 빌드
        run: docker build -t petnose-python-embed:ci ./python-embed
