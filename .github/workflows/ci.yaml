name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      # The repository does not commit a Gradle wrapper jar, so CI uses the
      # Gradle CLI distribution. v6 is current; cache-provider: basic avoids
      # the enhanced/proprietary caching path while keeping stable dependency cache behavior.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"
          cache-provider: basic

      - name: Run Gradle tests
        run: gradle test --no-daemon --stacktrace

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python-embed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-embed/requirements.txt

      - name: Install mock/dev test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run pytest
        run: pytest -q

  docs-script-check:
    name: Docs and script sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check whitespace
        run: git diff --check

      - name: Validate evidence JSON
        run: |
          set -euo pipefail
          python -m json.tool docs/model-analysis/experiment_summary.json > /dev/null
          python -m json.tool docs/ops-evidence/submission-real-model-e2e-summary.json > /dev/null

      - name: Verify PowerShell availability
        run: pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Check reconciliation script help and syntax
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/check-qdrant-reference-consistency.ps1 -Help
          pwsh -NoProfile -Command "& { [scriptblock]::Create((Get-Content -Raw './scripts/check-qdrant-reference-consistency.ps1')) | Out-Null }"

      - name: Check submission E2E script help and syntax
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/verify-submission-real-model-e2e.ps1 -Help
          pwsh -NoProfile -Command "& { [scriptblock]::Create((Get-Content -Raw './scripts/verify-submission-real-model-e2e.ps1')) | Out-Null }"

      - name: Secret scan-lite for committed evidence
        run: |
          set -euo pipefail
          if grep -R -n -E -- '-----BEGIN [A-Z ]*PRIVATE KEY-----|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{40,}|AKIA[0-9A-Z]{16}' docs/ops-evidence docs/model-analysis scripts; then
            echo "::error::Potential raw private key, JWT, API key, GitHub token, OpenAI key, or AWS key pattern found."
            exit 1
          fi

  compose-mock-smoke:
    name: Compose mock smoke
    runs-on: ubuntu-latest
    needs: [backend-test, python-test, docs-script-check]
    permissions:
      contents: read
    timeout-minutes: 25
    env:
      COMPOSE_ENV_FILE: infra/docker/.env
      QDRANT_COLLECTION: dog_nose_embeddings_ci_mock
      QDRANT_VECTOR_DIM: "128"
      EMBED_MODEL: mock-v1
      PYTHON_EMBED_INSTALL_REAL_DEPS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env
        run: cp infra/docker/.env.example "${COMPOSE_ENV_FILE}"

      - name: Validate compose config
        run: |
          set -euo pipefail
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            config > /tmp/petnose-compose-config.yaml
          grep -q "dog_nose_embeddings_ci_mock" /tmp/petnose-compose-config.yaml

      - name: Start compose mock stack
        run: |
          set -euo pipefail
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            up -d --build

      - name: Run mock smoke checks
        run: |
          set -euo pipefail

          compose_dev() {
            docker compose \
              --env-file "${COMPOSE_ENV_FILE}" \
              -f infra/docker/compose.yaml \
              -f infra/docker/compose.dev.yaml \
              "$@"
          }

          on_error() {
            echo "[ERROR] Compose mock smoke failed. Container status and logs follow."
            compose_dev ps || true
            compose_dev logs --tail=200 spring-api python-embed mysql qdrant nginx || true
          }
          trap on_error ERR

          echo "[INFO] Waiting for actuator health through nginx..."
          for attempt in $(seq 1 50); do
            if curl -fsS --max-time 5 http://localhost/actuator/health > /tmp/actuator.json; then
              break
            fi
            if [ "${attempt}" -eq 50 ]; then
              echo "[ERROR] actuator health did not become ready."
              exit 1
            fi
            sleep 3
          done

          python - <<'PY'
          import json
          with open("/tmp/actuator.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "UP", body
          PY

          echo "[INFO] Checking Python embed health and mock dimension..."
          curl -fsS http://localhost:8000/health > /tmp/python-health.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/python-health.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          assert body["model_loaded"] is True, body
          assert body["model"].startswith("mock-v1"), body
          assert body["vector_dim"] == expected_dim, body
          PY

          echo "[INFO] Checking Spring dev endpoints..."
          curl -fsS http://localhost:8080/api/dev/ping > /tmp/dev-ping.json
          python - <<'PY'
          import json
          with open("/tmp/dev-ping.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          PY

          curl -fsS http://localhost:8080/api/dev/embed-ping > /tmp/embed-ping.json
          python - <<'PY'
          import json
          with open("/tmp/embed-ping.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["embed_service_healthy"] is True, body
          PY

          echo "[INFO] Checking Spring -> Python /embed call and vector dimension..."
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7+2d8AAAAASUVORK5CYII=" | base64 -d > /tmp/smoke.png
          curl -fsS -X POST "http://localhost:8080/api/dev/embed-sample" \
            -F "image=@/tmp/smoke.png;type=image/png" > /tmp/embed-sample.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/embed-sample.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          assert body["dimension"] == expected_dim, body
          assert body["vector_length"] == expected_dim, body
          PY

          echo "[INFO] Checking Flyway and active dog nose v2 tables..."
          MYSQL_USER_VALUE="$(grep -m1 '^MYSQL_USER=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          MYSQL_PASSWORD_VALUE="$(grep -m1 '^MYSQL_PASSWORD=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          MYSQL_DATABASE_VALUE="$(grep -m1 '^MYSQL_DATABASE=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          FLYWAY_COUNT="$(compose_dev exec -T mysql mysql -u"${MYSQL_USER_VALUE}" -p"${MYSQL_PASSWORD_VALUE}" -D"${MYSQL_DATABASE_VALUE}" -Nse "SELECT COUNT(*) FROM flyway_schema_history WHERE success=1")"
          test "${FLYWAY_COUNT:-0}" -ge 1

          for table in users dogs dog_images dog_nose_references verification_logs adoption_posts adoption_post_likes password_reset_tokens; do
            TABLE_COUNT="$(compose_dev exec -T mysql mysql -u"${MYSQL_USER_VALUE}" -p"${MYSQL_PASSWORD_VALUE}" -D"${MYSQL_DATABASE_VALUE}" -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${MYSQL_DATABASE_VALUE}' AND table_name='${table}'")"
            test "${TABLE_COUNT}" -eq 1
          done

          echo "[INFO] Checking Qdrant mock collection contract..."
          curl -fsS "http://localhost:6333/collections/${QDRANT_COLLECTION}" > /tmp/qdrant-collection.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/qdrant-collection.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          vectors = body["result"]["config"]["params"]["vectors"]
          if "size" in vectors:
              size = vectors["size"]
              distance = vectors["distance"]
          else:
              first_vector = next(iter(vectors.values()))
              size = first_vector["size"]
              distance = first_vector["distance"]
          assert size == expected_dim, body
          assert distance.lower() == "cosine", body
          PY

      - name: Collect compose logs on failure
        if: failure()
        run: |
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            ps || true
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            logs --tail=200 spring-api python-embed mysql qdrant nginx || true

      - name: Cleanup compose
        if: always()
        run: |
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            down -v || true

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-test, python-test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t petnose-spring-api:ci ./backend

      - name: Build python embed mock image
        run: docker build --build-arg INSTALL_REAL_MODEL_DEPS=0 -t petnose-python-embed:ci ./python-embed
