name: CD - Dev Deploy (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. develop-latest or develop-<sha7>)"
        required: true
        default: "develop-latest"
  workflow_run:
    workflows: ["Publish Images to GHCR"]
    types: [completed]

jobs:
  dev-deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'develop')
    runs-on: [self-hosted, Linux, X64, petnose-dev]
    env:
      DEPLOY_ROOT: /opt/petnose
      SPRING_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/petnose-spring-api
      PYTHON_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/petnose-python-embed
    steps:
      - name: Resolve image tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="develop-${SHA:0:7}"
          fi
          if [[ ! "${TAG}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "[ERROR] Invalid image tag format: ${TAG}"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Preflight on dev server (local runner)
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_ROOT}"
          test -f infra/scripts/deploy.sh
          test -f infra/docker/.env
          test -f infra/docker/compose.yaml
          test -f infra/docker/compose.prod.yaml
          grep -q '^SPRING_API_IMAGE=' infra/docker/.env
          grep -q '^PYTHON_EMBED_IMAGE=' infra/docker/.env
          docker --version
          docker compose version
          curl --version
          docker compose --env-file infra/docker/.env -f infra/docker/compose.yaml -f infra/docker/compose.prod.yaml config >/dev/null

      - name: Pin image tags in env
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_ROOT}"
          TAG="${{ steps.resolve.outputs.tag }}"
          sed -i "s|^SPRING_API_IMAGE=.*|SPRING_API_IMAGE=${SPRING_IMAGE_REPO}:${TAG}|" infra/docker/.env
          sed -i "s|^PYTHON_EMBED_IMAGE=.*|PYTHON_EMBED_IMAGE=${PYTHON_IMAGE_REPO}:${TAG}|" infra/docker/.env

      - name: Run deploy.sh on dev server
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_ROOT}"
          bash infra/scripts/deploy.sh

      - name: Post-deploy status snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_ROOT}"
          docker compose --env-file infra/docker/.env -f infra/docker/compose.yaml -f infra/docker/compose.prod.yaml ps
          curl -fsS http://localhost/actuator/health || true
