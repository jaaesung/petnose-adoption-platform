name: Publish Images to GHCR

# develop 또는 main push 시 이미지를 빌드하고 GHCR에 publish합니다.
# PR에서는 동작하지 않습니다 (ci.yaml의 docker-build job이 검증을 담당).
# canonical deploy path에서 cd-dev/cd-prod가 이 이미지를 pull하여 배포합니다.
#
# 생성 이미지:
#   ghcr.io/<owner>/petnose-spring-api
#   ghcr.io/<owner>/petnose-python-embed
#   ghcr.io/<owner>/petnose-python-embed-real
#
# 태그 전략:
#   develop-latest      develop 브랜치 최신 커밋
#   develop-<shortsha>  develop 브랜치 특정 커밋 (7자리 SHA)
#   main-latest         main 브랜치 최신 커밋
#   main-<shortsha>     main 브랜치 특정 커밋
#
# real image policy:
#   - petnose-python-embed-real은 real-model Python dependencies만 포함합니다.
#   - dog-nose-identification2 checkpoint는 이미지에 포함하지 않습니다.
#   - checkpoint, Firebase credential, JWT secret, DOG_NOSE_MODEL_DIR_HOST 등
#     runtime/server-only 값은 build args로 전달하지 않습니다.

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    name: "${{ matrix.name }} -> GHCR"
    runs-on: ubuntu-latest

    strategy:
      # 한 이미지가 실패해도 나머지는 계속 진행
      fail-fast: false
      matrix:
        include:
          - name: spring-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_suffix: petnose-spring-api
            build_args: ""

          - name: python-embed
            context: ./python-embed
            dockerfile: ./python-embed/Dockerfile
            image_suffix: petnose-python-embed
            build_args: ""

          - name: python-embed-real
            context: ./python-embed
            dockerfile: ./python-embed/Dockerfile
            image_suffix: petnose-python-embed-real
            build_args: |
              INSTALL_REAL_MODEL_DEPS=1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check build args are non-secret
        env:
          BUILD_ARGS: ${{ matrix.build_args }}
        run: |
          set -euo pipefail
          if printf '%s\n' "${BUILD_ARGS}" | grep -E 'PRIVATE_KEY|FIREBASE|AUTH_JWT_SECRET|TOKEN|PASSWORD|DOG_NOSE_MODEL_DIR_HOST'; then
            echo "::error::Build args must not contain secrets or runtime host paths."
            exit 1
          fi

      # BuildKit 활성화. Docker docs의 attestation/SBOM 예시는 setup-buildx-action@v4와
      # build-push-action@v7을 사용하며, pushed image에만 attestations를 붙일 수 있습니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=${{ github.ref_name }}-latest
            type=sha,prefix=${{ github.ref_name }}-,format=short

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          provenance: mode=max
          sbom: true
          # 서비스별 독립 캐시 스코프 (spring-api / python-embed / python-embed-real 분리)
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Generate GitHub image attestation
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Write image digest summary
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "### ${IMAGE_NAME}"
            echo ""
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Provenance: docker/build-push-action \`mode=max\` + GitHub image attestation"
            echo "- SBOM: docker/build-push-action \`sbom: true\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              if [ -n "${tag}" ]; then
                echo "  - \`${tag}\`"
              fi
            done <<< "${IMAGE_TAGS}"
            echo ""
            echo "Real-model checkpoint and server-only secrets are not baked into this image."
          } >> "${GITHUB_STEP_SUMMARY}"
