name: Publish Images to GHCR

# develop 또는 main push 시 이미지를 빌드하고 GHCR에 publish합니다.
# PR에서는 동작하지 않습니다 (ci.yaml의 docker-build job이 검증을 담당).
#
# 생성 이미지:
#   ghcr.io/<owner>/petnose-spring-api
#   ghcr.io/<owner>/petnose-python-embed
#
# 태그 전략:
#   develop-latest      develop 브랜치 최신 커밋
#   develop-<shortsha>  develop 브랜치 특정 커밋 (7자리 SHA)
#   main-latest         main 브랜치 최신 커밋
#   main-<shortsha>     main 브랜치 특정 커밋

on:
  push:
    branches:
      - develop
      - main

# GITHUB_TOKEN 에 packages write 권한 부여 (GHCR push 필수)
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: "${{ matrix.name }} → GHCR"
    runs-on: ubuntu-latest

    strategy:
      # 한 이미지가 실패해도 나머지는 계속 진행
      fail-fast: false
      matrix:
        include:
          - name: spring-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_suffix: petnose-spring-api

          - name: python-embed
            context: ./python-embed
            dockerfile: ./python-embed/Dockerfile
            image_suffix: petnose-python-embed

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # BuildKit 활성화 — 레이어 캐시(type=gha) 사용에 필요
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN 으로 GHCR 인증 (별도 secrets 불필요)
      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 브랜치명과 SHA 기반 태그 자동 생성
      # 결과 예: develop-latest, develop-a1b2c3d
      - name: 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=${{ github.ref_name }}-latest
            type=sha,prefix=${{ github.ref_name }}-,format=short

      - name: 이미지 빌드 및 push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 서비스별 독립 캐시 스코프 (spring-api / python-embed 분리)
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
