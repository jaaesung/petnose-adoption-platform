spring:
  application:
    name: petnose-api
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    # 테스트에서는 H2 in-memory 로 엔티티 기반 스키마 자동 생성/삭제.
    # Flyway 는 비활성화 — MySQL 전용 SQL 이 H2 에서 실행되지 않도록 차단.
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

embed:
  url: http://localhost:9999

qdrant:
  host: localhost
  port: 9998
  collection: test_collection
  vector-dimension: 128
  distance: Cosine
  search-score-threshold: ${QDRANT_SEARCH_SCORE_THRESHOLD:0.55}

upload:
  base-path: /tmp/uploads-test

nose:
  duplicate-threshold: ${NOSE_DUPLICATE_THRESHOLD:0.65}
  review-lower-bound: ${NOSE_REVIEW_LOWER_BOUND:0.60}
  reference-consistency-threshold: ${NOSE_REFERENCE_CONSISTENCY_THRESHOLD:0.55}

petnose:
  handover-verification:
    match-threshold: ${PETNOSE_HANDOVER_VERIFICATION_MATCH_THRESHOLD:0.65}
    ambiguous-threshold: ${PETNOSE_HANDOVER_VERIFICATION_AMBIGUOUS_THRESHOLD:0.60}
    top-k: ${PETNOSE_HANDOVER_VERIFICATION_TOP_K:5}

auth:
  jwt:
    secret: test-petnose-jwt-secret-change-me-32bytes
    access-token-ttl-seconds: 3600

firebase:
  enabled: false
  project-id: ''
  credentials-path: ''

logging:
  level:
    com.petnose: WARN
