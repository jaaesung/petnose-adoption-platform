spring:
  application:
    name: petnose-api
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

embed:
  url: http://localhost:9999

qdrant:
  host: localhost
  port: 9998
  collection: test_collection
  vector-dimension: 128

upload:
  base-path: /tmp/uploads-test

logging:
  level:
    com.petnose: WARN
