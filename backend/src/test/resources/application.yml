spring:
  application:
    name: petnose-api
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    # 테스트에서는 H2 in-memory 로 엔티티 기반 스키마 자동 생성/삭제.
    # Flyway 는 비활성화 — MySQL 전용 SQL 이 H2 에서 실행되지 않도록 차단.
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

embed:
  url: http://localhost:9999

qdrant:
  host: localhost
  port: 9998
  collection: test_collection
  vector-dimension: 128
  distance: Cosine

upload:
  base-path: /tmp/uploads-test

logging:
  level:
    com.petnose: WARN
