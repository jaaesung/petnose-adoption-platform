spring:
  application:
    name: petnose-api

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": ${MAIL_SMTP_AUTH:true}
      "[mail.smtp.starttls.enable]": ${MAIL_SMTP_STARTTLS_ENABLE:true}
      "[mail.smtp.connectiontimeout]": ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
      "[mail.smtp.timeout]": ${MAIL_SMTP_TIMEOUT_MS:3000}
      "[mail.smtp.writetimeout]": ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petnose?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:petnose}
    password: ${SPRING_DATASOURCE_PASSWORD:petnose_dev_pw}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    # Flyway 도입 이후 JPA는 스키마를 직접 변경하지 않음.
    # none: Flyway 가 DDL 을 전담. JPA는 엔티티-스키마 정합성 검사도 하지 않음.
    # 엔티티 구현이 완료되면 validate 로 변경하여 정합성 검사를 활성화할 것.
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    # Flyway 마이그레이션 활성화 (기본 경로: classpath:db/migration)
    enabled: true
    # 기존 DB 에서 flyway_schema_history 가 없는 상태로 V1 을 처음 적용할 때:
    #   IF NOT EXISTS 로 안전하게 처리되므로 baseline-on-migrate 불필요.
    # 운영 DB 에 이미 스키마가 있고 Flyway 를 새로 도입하는 경우:
    #   spring.flyway.baseline-on-migrate=true 와 baseline-version=1 로 설정하면
    #   기존 상태를 V1 으로 간주하고 이후 버전만 적용함.

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE_MB:20}MB
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE_MB:80}MB

server:
  port: 8080

management:
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

embed:
  url: ${PYTHON_EMBED_URL:http://localhost:8000}
  connect-timeout-ms: ${PYTHON_EMBED_CONNECT_TIMEOUT_MS:3000}
  response-timeout-ms: ${PYTHON_EMBED_RESPONSE_TIMEOUT_MS:30000}

qdrant:
  host: ${QDRANT_HOST:qdrant}
  port: ${QDRANT_PORT:6333}
  collection: ${QDRANT_COLLECTION:dog_nose_embeddings_real_v2}
  vector-dimension: ${QDRANT_VECTOR_DIM:2048}
  distance: ${QDRANT_DISTANCE:Cosine}
  search-top-k: ${QDRANT_SEARCH_TOP_K:5}
  search-score-threshold: ${QDRANT_SEARCH_SCORE_THRESHOLD:0.55}
  search-timeout-ms: ${QDRANT_SEARCH_TIMEOUT_MS:3000}
  upsert-timeout-ms: ${QDRANT_UPSERT_TIMEOUT_MS:3000}

upload:
  base-path: ${UPLOAD_BASE_PATH:/var/uploads}

nose:
  duplicate-threshold: ${NOSE_DUPLICATE_THRESHOLD:0.65}
  review-lower-bound: ${NOSE_REVIEW_LOWER_BOUND:0.65}
  reference-min-count: ${NOSE_REFERENCE_MIN_COUNT:5}
  reference-max-count: ${NOSE_REFERENCE_MAX_COUNT:5}
  reference-consistency-threshold: ${NOSE_REFERENCE_CONSISTENCY_THRESHOLD:0.55}
  reference-outlier-improvement-threshold: ${NOSE_REFERENCE_OUTLIER_IMPROVEMENT_THRESHOLD:0.04}
  reference-quality-warning-enabled: ${NOSE_REFERENCE_QUALITY_WARNING_ENABLED:true}
  preprocess-version: ${NOSE_PREPROCESS_VERSION:rgb_resize224_bicubic_imagenet_l2_v1}

petnose:
  handover-verification:
    match-threshold: ${PETNOSE_HANDOVER_VERIFICATION_MATCH_THRESHOLD:0.65}
    ambiguous-threshold: ${PETNOSE_HANDOVER_VERIFICATION_AMBIGUOUS_THRESHOLD:0.65}
    top-k: ${PETNOSE_HANDOVER_VERIFICATION_TOP_K:5}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:petnose-local-dev-jwt-secret-change-me-32bytes}
    access-token-ttl-seconds: ${AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
  password-reset:
    token-ttl-seconds: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:1800}
    expose-token-in-response: ${AUTH_PASSWORD_RESET_EXPOSE_TOKEN_IN_RESPONSE:false}
    email-enabled: ${AUTH_PASSWORD_RESET_EMAIL_ENABLED:false}
    reset-url-template: ${AUTH_PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/password-reset?token={token}}
    mail-from: ${AUTH_PASSWORD_RESET_MAIL_FROM:no-reply@petnose.local}
    mail-subject: ${AUTH_PASSWORD_RESET_MAIL_SUBJECT:[PetNose] 비밀번호 재설정 안내}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

logging:
  level:
    com.petnose: DEBUG
    org.springframework.web: INFO
