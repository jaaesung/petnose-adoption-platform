spring:
  application:
    name: petnose-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petnose?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:petnose}
    password: ${SPRING_DATASOURCE_PASSWORD:petnose_dev_pw}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    # Flyway 도입 이후 JPA는 스키마를 직접 변경하지 않음.
    # none: Flyway 가 DDL 을 전담. JPA는 엔티티-스키마 정합성 검사도 하지 않음.
    # 엔티티 구현이 완료되면 validate 로 변경하여 정합성 검사를 활성화할 것.
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    # Flyway 마이그레이션 활성화 (기본 경로: classpath:db/migration)
    enabled: true
    # 기존 DB 에서 flyway_schema_history 가 없는 상태로 V1 을 처음 적용할 때:
    #   IF NOT EXISTS 로 안전하게 처리되므로 baseline-on-migrate 불필요.
    # 운영 DB 에 이미 스키마가 있고 Flyway 를 새로 도입하는 경우:
    #   spring.flyway.baseline-on-migrate=true 와 baseline-version=1 로 설정하면
    #   기존 상태를 V1 으로 간주하고 이후 버전만 적용함.

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE_MB:20}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:20}MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

embed:
  url: ${PYTHON_EMBED_URL:http://localhost:8000}
  connect-timeout-ms: ${PYTHON_EMBED_CONNECT_TIMEOUT_MS:3000}
  response-timeout-ms: ${PYTHON_EMBED_RESPONSE_TIMEOUT_MS:10000}

qdrant:
  host: ${QDRANT_HOST:qdrant}
  port: ${QDRANT_PORT:6333}
  collection: ${QDRANT_COLLECTION:dog_nose_embeddings}
  vector-dimension: ${QDRANT_VECTOR_DIM:128}
  distance: ${QDRANT_DISTANCE:Cosine}
  search-top-k: ${QDRANT_SEARCH_TOP_K:5}
  search-score-threshold: ${QDRANT_SEARCH_SCORE_THRESHOLD:0.95}
  search-timeout-ms: ${QDRANT_SEARCH_TIMEOUT_MS:3000}
  upsert-timeout-ms: ${QDRANT_UPSERT_TIMEOUT_MS:3000}

upload:
  base-path: ${UPLOAD_BASE_PATH:/var/uploads}

nose:
  duplicate-threshold: ${NOSE_DUPLICATE_THRESHOLD:0.95}

logging:
  level:
    com.petnose: DEBUG
    org.springframework.web: INFO
